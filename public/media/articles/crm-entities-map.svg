<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Карта сущностей CRM</title>
  <desc id="desc">Схема различий между лидом, сделкой, контактом и компанией.</desc>
  <rect width="1200" height="760" rx="36" fill="#F8F7F2"/>
  <text x="72" y="104" fill="#171717" font-family="Arial, sans-serif" font-size="42" font-weight="800">Лид, сделка, контакт, компания</text>
  <text x="74" y="146" fill="#6F695F" font-family="Arial, sans-serif" font-size="22">Что где хранить, чтобы не плодить дубли</text>
  <rect x="72" y="208" width="240" height="330" rx="24" fill="#171717"/>
  <text x="104" y="260" fill="#FFD45A" font-family="Arial, sans-serif" font-size="30" font-weight="800">Лид</text>
  <text x="104" y="308" fill="#FFFFFF" opacity=".82" font-family="Arial, sans-serif" font-size="20">сырой входящий</text>
  <text x="104" y="338" fill="#FFFFFF" opacity=".82" font-family="Arial, sans-serif" font-size="20">вопрос до</text>
  <text x="104" y="368" fill="#FFFFFF" opacity=".82" font-family="Arial, sans-serif" font-size="20">квалификации</text>
  <rect x="102" y="420" width="178" height="58" rx="16" fill="#2D2D2D"/>
  <text x="126" y="456" fill="#FFFFFF" font-family="Arial, sans-serif" font-size="18" font-weight="700">проверить</text>
  <path d="M326 374H438" stroke="#ED1C24" stroke-width="6" stroke-linecap="round"/>
  <path d="M420 354L440 374L420 394" stroke="#ED1C24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="452" y="208" width="276" height="330" rx="24" fill="#FFFFFF" stroke="#E4DED2"/>
  <text x="488" y="260" fill="#171717" font-family="Arial, sans-serif" font-size="30" font-weight="800">Сделка</text>
  <text x="488" y="308" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">продажа, этапы,</text>
  <text x="488" y="338" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">сумма, ответственный</text>
  <rect x="488" y="396" width="204" height="28" rx="14" fill="#FEF1F2"/>
  <rect x="488" y="440" width="150" height="28" rx="14" fill="#FFF4D1"/>
  <rect x="488" y="484" width="188" height="28" rx="14" fill="#F1F8F2"/>
  <path d="M742 316H856" stroke="#ED1C24" stroke-width="6" stroke-linecap="round"/>
  <path d="M838 296L858 316L838 336" stroke="#ED1C24" stroke-width="6" stroke-linecap="round" stroke-linejoin="round"/>
  <rect x="872" y="168" width="256" height="180" rx="24" fill="#FFF8E4" stroke="#F0DFA8"/>
  <text x="904" y="222" fill="#7A1216" font-family="Arial, sans-serif" font-size="30" font-weight="800">Контакт</text>
  <text x="904" y="270" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">конкретный человек</text>
  <text x="904" y="300" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">и каналы связи</text>
  <rect x="872" y="396" width="256" height="180" rx="24" fill="#FFFFFF" stroke="#E4DED2"/>
  <text x="904" y="450" fill="#171717" font-family="Arial, sans-serif" font-size="30" font-weight="800">Компания</text>
  <text x="904" y="498" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">организация,</text>
  <text x="904" y="528" fill="#6F695F" font-family="Arial, sans-serif" font-size="20">реквизиты, связи</text>
  <rect x="154" y="610" width="892" height="62" rx="22" fill="#FFFFFF" stroke="#E4DED2"/>
  <text x="188" y="650" fill="#171717" font-family="Arial, sans-serif" font-size="22" font-weight="700">Правило: клиент хранится отдельно от процесса продажи</text>
</svg>
