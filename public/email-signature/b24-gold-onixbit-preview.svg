<svg width="420" height="112" viewBox="0 0 420 112" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Золотой партнёр Битрикс24 и 1С-Битрикс</title>
  <desc id="desc">Компактный золотой бейдж для email-подписи: золотой партнёр Битрикс24 и 1С-Битрикс.</desc>
  <defs>
    <linearGradient id="gold" x1="16" y1="12" x2="397" y2="94" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B97808"/>
      <stop offset="0.28" stop-color="#FFE28A"/>
      <stop offset="0.56" stop-color="#D59A10"/>
      <stop offset="1" stop-color="#FFF0B6"/>
    </linearGradient>
    <linearGradient id="goldDeep" x1="48" y1="18" x2="112" y2="96" gradientUnits="userSpaceOnUse">
