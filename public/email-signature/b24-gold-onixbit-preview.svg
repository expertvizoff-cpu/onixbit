<svg width="560" height="180" viewBox="0 0 560 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Золотой партнёр Битрикс24 и 1С-Битрикс</title>
  <desc id="desc">Предпросмотр компактного бейджа для email-подписи: золотой партнёр, Битрикс24 и 1С-Битрикс.</desc>
  <defs>
    <linearGradient id="gold" x1="23" y1="14" x2="520" y2="105" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#B87908"/>
      <stop offset="0.25" stop-color="#F9C839"/>
      <stop offset="0.47" stop-color="#FFF0A9"/>
      <stop offset="0.68" stop-color="#D6990C"/>
      <stop offset="1" stop-color="#FFF1BA"/>
    </linearGradient>
    <linearGradient id="shine" x1="210" y1="-14" x2="318" y2="125" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.78"/>
      <stop offset="0.48" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>
    <filter id="cardShadow" x="0" y="0" width="560" height="180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="9" stdDeviation="9" flood-color="#3B2A08" flood-opacity="0.13"/>
    </filter>
    <filter id="imageShadow" x="342" y="-20" width="190" height="120" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="7" flood-color="#4B3104" flood-opacity="0.22"/>
    </filter>
  </defs>

  <g filter="url(#cardShadow)">
    <rect x="12" y="18" width="536" height="144" rx="24" fill="#FFFFFF"/>
    <rect x="13" y="19" width="534" height="142" rx="23" stroke="#EEE3C8" stroke-width="2"/>
    <path d="M36 18H524C537.255 18 548 28.745 548 42V104H12V42C12 28.745 22.745 18 36 18Z" fill="url(#gold)"/>
    <path d="M218 18H316L254 104H156L218 18Z" fill="url(#shine)"/>
    <path d="M12 104H548V138C548 151.255 537.255 162 524 162H36C22.745 162 12 151.255 12 138V104Z" fill="#FFFFFF"/>

    <text x="36" y="67" fill="#3F2804" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="32" font-weight="900" letter-spacing="0">Золотой партнёр</text>
    <rect x="36" y="81" width="228" height="4" rx="2" fill="#ED1C24"/>

    <g filter="url(#imageShadow)">
      <image href="https://onixbit.ru/email-signature/gold-partner-reference-cutout.png" x="356" y="-3" width="150" height="70" preserveAspectRatio="xMidYMid meet"/>
    </g>

    <g transform="translate(36 118)">
      <rect x="0" y="0" width="224" height="32" rx="10" fill="#F7FAFC" stroke="#E5E7EB"/>
      <circle cx="24" cy="16" r="12" fill="#2FC7F7"/>
      <text x="16" y="20" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="10" font-weight="900" letter-spacing="0">24</text>
      <text x="46" y="21" fill="#0F172A" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="18" font-weight="900" letter-spacing="0">Битрикс24</text>
    </g>

    <g transform="translate(282 118)">
      <rect x="0" y="0" width="230" height="32" rx="10" fill="#F7FAFC" stroke="#E5E7EB"/>
      <rect x="14" y="8" width="26" height="16" rx="3" fill="#ED1C24"/>
      <text x="18" y="20" fill="#FFFFFF" font-family="Arial, Helvetica, sans-serif" font-size="12" font-weight="900" letter-spacing="0">1C</text>
      <text x="52" y="21" fill="#0F172A" font-family="Montserrat, Arial, Helvetica, sans-serif" font-size="18" font-weight="900" letter-spacing="0">1С-Битрикс</text>
    </g>
  </g>
</svg>
