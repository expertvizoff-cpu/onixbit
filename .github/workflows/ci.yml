name: CI

on:
  push:
    branches:
      - main
    paths:
      - "onixbit-next/**"
      - ".github/workflows/ci.yml"
  pull_request:
    paths:
      - "onixbit-next/**"
      - ".github/workflows/ci.yml"

defaults:
  run:
    working-directory: onixbit-next

jobs:
  check:
    name: Lint, audit and build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: onixbit-next/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production audit
        run: npm audit --omit=dev

      - name: Build
        run: npm run build
