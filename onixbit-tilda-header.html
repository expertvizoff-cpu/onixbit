<script>
  (function () {
    var header = document.querySelector('[data-ob-site-header]');
    if (!header) return;

    var syncFloatingHeader = function () {
      header.classList.toggle("is-scrolled", window.scrollY > 12);
    };
    syncFloatingHeader();
    window.addEventListener("scroll", syncFloatingHeader, { passive: true });

    var button = header.querySelector('.ob-site-header__burger');
    var mobile = header.querySelector('.ob-site-header__mobile');
    if (!button || !mobile) return;

    button.addEventListener('click', function () {
      var isOpen = mobile.classList.toggle('is-open');
      button.setAttribute('aria-expanded', isOpen ? 'true' : 'false');
    });

    mobile.addEventListener('click', function (event) {
      if (event.target.closest('a')) {
        mobile.classList.remove('is-open');
        button.setAttribute('aria-expanded', 'false');
      }
    });

    var navLinks = Array.prototype.slice.call(header.querySelectorAll(".ob-site-header__nav-link, .ob-site-header__mobile-link"));
    var normalizePath = function (value) {
      return (value || "/").replace(/\/index\.html$/, "/").replace(/\/$/, "") || "/";
    };
    var currentPath = normalizePath(window.location.pathname);

    var getLinkKey = function (link) {
      var linkUrl = new URL(link.getAttribute("href"), window.location.origin);
      return normalizePath(linkUrl.pathname) + linkUrl.hash;
    };

    var setActiveLink = function (activeLink) {
      var activeKey = getLinkKey(activeLink);
      navLinks.forEach(function (link) {
        var isActive = getLinkKey(link) === activeKey;
        link.classList.toggle("is-active", isActive);
        if (isActive) {
          link.setAttribute("aria-current", "page");
        } else {
          link.removeAttribute("aria-current");
        }
      });
    };

    var setActiveByPath = function (path) {
      var normalizedPath = normalizePath(path);
      var match = navLinks.find(function (link) {
        var linkUrl = new URL(link.getAttribute("href"), window.location.origin);
        return normalizePath(linkUrl.pathname) === normalizedPath;
      });
      if (match) setActiveLink(match);
    };

    setActiveByPath(currentPath);

    navLinks.forEach(function (link) {
      link.addEventListener("click", function () {
        setActiveLink(link);
      });
    });

    var samePageSectionLinks = navLinks.filter(function (link) {
      var linkUrl = new URL(link.getAttribute("href"), window.location.origin);
      return linkUrl.hash && normalizePath(linkUrl.pathname) === currentPath && document.querySelector(linkUrl.hash);
    });

    if (samePageSectionLinks.length && "IntersectionObserver" in window) {
      var byHash = {};
      samePageSectionLinks.forEach(function (link) {
        var linkUrl = new URL(link.getAttribute("href"), window.location.origin);
        byHash[linkUrl.hash] = link;
      });

      var observer = new IntersectionObserver(function (entries) {
        entries.forEach(function (entry) {
          if (entry.isIntersecting) {
            setActiveLink(byHash["#" + entry.target.id]);
          }
        });
      }, { rootMargin: "-34% 0px -52%", threshold: 0.01 });

      Object.keys(byHash).forEach(function (hash) {
        observer.observe(document.querySelector(hash));
      });
    }
  })();
</script>
